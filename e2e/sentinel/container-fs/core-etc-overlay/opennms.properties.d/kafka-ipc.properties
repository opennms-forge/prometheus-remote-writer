# Activate Kafka as Core's IPC fabric so Minion-published sink messages
# (events, alarms, telemetry, SNMP-poll results) and Twin-RPC
# bidirectional messaging route through Kafka rather than the in-VM bus.
# Required for Sentinel to consume the same topics from the other side.

org.opennms.core.ipc.sink.strategy = kafka
org.opennms.core.ipc.rpc.strategy  = kafka
org.opennms.core.ipc.twin.strategy = kafka

org.opennms.core.ipc.sink.kafka.bootstrap.servers = kafka:9092
org.opennms.core.ipc.rpc.kafka.bootstrap.servers  = kafka:9092
org.opennms.core.ipc.twin.kafka.bootstrap.servers = kafka:9092
