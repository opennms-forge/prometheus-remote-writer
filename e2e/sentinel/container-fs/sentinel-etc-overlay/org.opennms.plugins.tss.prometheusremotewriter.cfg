# prometheus-remote-writer plugin config — Sentinel-side, spike scenario.
#
# Lands at /opt/sentinel/etc/org.opennms.plugins.tss.prometheusremotewriter.cfg
# via the etc-overlay copy mechanism. The plugin's Blueprint container
# picks this up through ConfigAdmin once the bundle resolves.

# --- Endpoint ---------------------------------------------------------------
write.url = http://prometheus:9090/api/v1/write
read.url  = http://prometheus:9090

# --- Source identity --------------------------------------------------------
# Tags every outbound sample with onms_instance_id=e2e-sentinel so it can be
# disambiguated from any Horizon-Core-emitted samples sharing the backend.
instance.id = e2e-sentinel

# --- Wire protocol ----------------------------------------------------------
# v1 — broadest backend support, matches the existing per-backend e2e
# scenarios. Bump to 2 once the Sentinel surface is verified against v1.
wire.protocol-version = 1

# --- WAL --------------------------------------------------------------------
# Spike phase 1 keeps WAL off. Sentinel containers may not have a writable
# persistent volume at the WAL default path; the spec requires WAL volume
# documentation as a follow-up scenario.
wal.enabled = false

# --- Throughput tuning (sandbox-friendly) -----------------------------------
batch.size                = 200
flush.interval-ms         = 500
queue.capacity            = 5000
retry.max-attempts        = 3
retry.initial-backoff-ms  = 250
retry.max-backoff-ms      = 2000
shutdown.grace-period-ms  = 5000

# Surface every metatag the timeseries pipeline interpolates as a label.
labels.include = *
