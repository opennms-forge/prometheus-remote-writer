# Kafka Sink Server (consumer side) — Sentinel reads this PID via the
# blueprint-ipc-server.xml's OsgiKafkaConfigProvider construction:
#
#   <argument value="[[group.id]]"/>
#   <argument value="org.opennms.core.ipc.sink.kafka.consumer"/>
#   <argument ref="configurationAdmin"/>
#
# This 3-arg constructor leaves commonPID = null in OsgiKafkaConfigProvider.
# When `bootstrap.servers` is missing here, getProperties() falls through to
# `configAdmin.getConfiguration(null)` and throws NullPointerException —
# upstream OpenNMS bug worth a separate issue, but the workaround is simply
# to ensure this file ALWAYS carries `bootstrap.servers` so the fallback is
# never reached.
bootstrap.servers = kafka:9092
group.id          = OpenNMS
