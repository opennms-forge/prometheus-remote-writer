apiVersion: 1

# Datasource mounted into Grafana by compose.victoriametrics.yml.
# VictoriaMetrics implements the Prometheus query API, so the standard
# prometheus datasource type works.
datasources:
  - name: OpenNMS (VictoriaMetrics)
    type: prometheus
    uid: onms-vm
    access: proxy
    url: http://victoriametrics:8428
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 30s
      httpMethod: POST
