apiVersion: 1

# Datasource mounted into Grafana by compose.mimir.yml.
# Mimir is multi-tenant; the X-Scope-OrgID header is required on every
# query and must match the tenant the plugin writes as (see
# opennms/mimir.cfg → tenant.org-id = e2e).
datasources:
  - name: OpenNMS (Mimir)
    type: prometheus
    uid: onms-mimir
    access: proxy
    url: http://mimir:9009/prometheus
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 30s
      httpMethod: POST
      httpHeaderName1: X-Scope-OrgID
    secureJsonData:
      httpHeaderValue1: e2e
