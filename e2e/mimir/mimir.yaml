# Single-binary Mimir config for the E2E sandbox.
# All components in one process, local filesystem for storage, no
# replication. Not representative of production; fine for dev.

target: all,alertmanager,overrides-exporter

multitenancy_enabled: true

server:
  http_listen_port: 9009
  grpc_listen_port: 9095
  log_level: warn

common:
  storage:
    backend: filesystem
    filesystem:
      dir: /data/bucket

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/blocks
  tsdb:
    dir: /data/tsdb

compactor:
  data_dir: /data/compactor
  sharding_ring:
    kvstore:
      store: memberlist

ingester:
  ring:
    kvstore:
      store: memberlist
    replication_factor: 1

store_gateway:
  sharding_ring:
    kvstore:
      store: memberlist
    replication_factor: 1

ruler_storage:
  backend: filesystem
  filesystem:
    dir: /data/rules

alertmanager:
  # data_dir must not be a string-prefix of alertmanager_storage.dir,
  # Mimir's config validator rejects overlapping paths.
  data_dir: /data/am-runtime
  sharding_ring:
    replication_factor: 1
  external_url: http://localhost:9009/alertmanager

alertmanager_storage:
  backend: filesystem
  filesystem:
    dir: /data/am-storage

memberlist:
  join_members: []
