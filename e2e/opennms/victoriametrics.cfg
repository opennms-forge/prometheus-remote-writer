# prometheus-remote-writer plugin config — VictoriaMetrics backend.
#
# Mounted into /opt/opennms-etc-overlay/ → landed at
# /opt/opennms/etc/org.opennms.plugins.tss.prometheusremotewriter.cfg at
# container start.

write.url = http://victoriametrics:8428/api/v1/write
read.url  = http://victoriametrics:8428

batch.size                = 200
flush.interval-ms         = 500
queue.capacity            = 5000

retry.max-attempts        = 3
retry.initial-backoff-ms  = 250
retry.max-backoff-ms      = 2000

shutdown.grace-period-ms  = 5000

# Surface the sys* and asset* tags populated by opennms.properties.d/metatags.properties
# as Prometheus labels. The plugin's default allowlist already handles
# node/foreign-source/location/ifName/etc.
labels.include = *
