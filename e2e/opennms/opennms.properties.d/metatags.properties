# ---- surveillance categories -------------------------------------------
# Opt-in: emits a `categories` tag (comma-separated) plus one `cat_<name>`
# tag per category. The plugin's LabelMapper already expands the
# `categories` tag into one `onms_cat_<name>` label per value.
org.opennms.timeseries.tin.metatags.exposeCategories = true
