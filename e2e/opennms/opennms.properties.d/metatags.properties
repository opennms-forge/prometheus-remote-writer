# Sandbox-only: expose every MATE scope key the timeseries pipeline can
# interpolate as a sample tag, so the prometheus-remote-writer plugin
# surfaces them as Prometheus labels.
#
# Mechanism: MetaTagDataLoader (features/timeseries) runs each value
# template through the MATE Interpolator against a FallbackScope built
# from getScopeForNode / getScopeForInterface* / getScopeForService, then
# attaches a tag for every non-empty result. Tags with empty interpolation
# results are dropped, so listing a key that doesn't apply to a given
# resource is harmless.
#
# Tag names here use camelCase so the plugin's default allowlist picks
# up the ones it recognises (nodeLabel, foreignSource, foreignId,
# location, ifName, ifDescr). Everything else flows through via
# `labels.include = *`.
#
# Secret-bearing asset fields (password, snmpcommunity, enable,
# autoenable) are intentionally excluded; the plugin's metadata denylist
# would strip them anyway.

# ---- node scope ---------------------------------------------------------
org.opennms.timeseries.tin.metatags.tag.nodeCriteria   = ${node:criteria}
org.opennms.timeseries.tin.metatags.tag.nodeLabel      = ${node:label}
org.opennms.timeseries.tin.metatags.tag.foreignSource  = ${node:foreign-source}
org.opennms.timeseries.tin.metatags.tag.foreignId      = ${node:foreign-id}
org.opennms.timeseries.tin.metatags.tag.location       = ${node:location}
org.opennms.timeseries.tin.metatags.tag.sysName        = ${node:sys-name}
org.opennms.timeseries.tin.metatags.tag.sysLocation    = ${node:sys-location}
org.opennms.timeseries.tin.metatags.tag.sysContact     = ${node:sys-contact}
org.opennms.timeseries.tin.metatags.tag.sysDescription = ${node:sys-description}
org.opennms.timeseries.tin.metatags.tag.sysObjectId    = ${node:sys-object-id}
org.opennms.timeseries.tin.metatags.tag.os             = ${node:os}
org.opennms.timeseries.tin.metatags.tag.netbiosDomain  = ${node:netbios-domain}
org.opennms.timeseries.tin.metatags.tag.netbiosName    = ${node:netbios-name}
org.opennms.timeseries.tin.metatags.tag.area           = ${node:area}
org.opennms.timeseries.tin.metatags.tag.geohash        = ${node:geohash}

# ---- interface scope ----------------------------------------------------
# Only populated when the sample's resource type is `if` (SNMP interface)
# or latency with INTERFACE_INFO_IN_TAGS enabled.
org.opennms.timeseries.tin.metatags.tag.hostname       = ${interface:hostname}
org.opennms.timeseries.tin.metatags.tag.ipAddress      = ${interface:address}
org.opennms.timeseries.tin.metatags.tag.netmask        = ${interface:netmask}
org.opennms.timeseries.tin.metatags.tag.ifIndex        = ${interface:if-index}
org.opennms.timeseries.tin.metatags.tag.ifAlias        = ${interface:if-alias}
# Plugin expects the tag key `ifDescr` to produce the `if_descr` label.
org.opennms.timeseries.tin.metatags.tag.ifDescr        = ${interface:if-description}
org.opennms.timeseries.tin.metatags.tag.ifName         = ${interface:if-name}
org.opennms.timeseries.tin.metatags.tag.phyAddr        = ${interface:phy-addr}

# ---- service scope ------------------------------------------------------
# Only populated for latency resources (RESOURCE_TYPE_LATENCY).
org.opennms.timeseries.tin.metatags.tag.serviceName    = ${service:name}

