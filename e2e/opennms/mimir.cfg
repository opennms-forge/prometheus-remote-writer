# prometheus-remote-writer plugin config — Grafana Mimir backend.
#
# Mounted into /opt/opennms-etc-overlay/ → landed at
# /opt/opennms/etc/org.opennms.plugins.tss.prometheusremotewriter.cfg at
# container start.
#
# Mimir is multi-tenant by default; tenant.org-id is required.

write.url     = http://mimir:9009/api/v1/push
read.url      = http://mimir:9009/prometheus
tenant.org-id = e2e

batch.size                = 200
flush.interval-ms         = 500
queue.capacity            = 5000

retry.max-attempts        = 3
retry.initial-backoff-ms  = 250
retry.max-backoff-ms      = 2000

shutdown.grace-period-ms  = 5000
