# prometheus-remote-writer plugin config — Prometheus backend.
#
# Mounted into /opt/opennms-etc-overlay/ → landed at
# /opt/opennms/etc/org.opennms.plugins.tss.prometheusremotewriter.cfg at
# container start.

write.url = http://prometheus:9090/api/v1/write
read.url  = http://prometheus:9090

# Faster flush than the production default — feedback loop of seconds, not
# minutes, when iterating in the sandbox.
batch.size                = 200
flush.interval-ms         = 500
queue.capacity            = 5000

# Tighter retries so a down backend is reported quickly.
retry.max-attempts        = 3
retry.initial-backoff-ms  = 250
retry.max-backoff-ms      = 2000

shutdown.grace-period-ms  = 5000
