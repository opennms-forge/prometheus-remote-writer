# OpenNMS Prometheus Remote Writer — plugin configuration
#
# PID: org.opennms.plugins.tss.prometheus-remote-writer
#
# Changes take effect on the next flush cycle; no OpenNMS restart required.
# Lines starting with '#' are comments. Blank values use the plugin default
# shown in the comment above each setting.

# --- Endpoint -----------------------------------------------------------------

# HTTPS URL of your Prometheus-compatible Remote Write endpoint. Required.
#   Prometheus:         https://prom.example.com/api/v1/write
#   Grafana Mimir:      https://mimir.example.com/api/v1/push
#   VictoriaMetrics:    https://vm.example.com/api/v1/write
#   Cortex:             https://cortex.example.com/api/v1/push
#   Thanos Receive:     https://thanos.example.com/api/v1/receive
write.url =

# HTTPS URL of the backend's Prometheus-compatible query root. The plugin
# appends /api/v1/series and /api/v1/query_range itself — do NOT include
# /api/v1 in this value. OpenNMS internals call this path for Resource
# Graphs, threshold evaluation, and the measurement API. Required.
#   Prometheus:         https://prom.example.com
#   Grafana Mimir:      https://mimir.example.com/prometheus
#   VictoriaMetrics:    https://vm.example.com
#   Cortex:             https://cortex.example.com/prometheus
#   Thanos Query:       https://thanos-query.example.com
read.url =

# --- Authentication -----------------------------------------------------------
# Basic and Bearer auth are mutually exclusive. If both are set the plugin
# refuses to start.

# HTTP Basic auth. Leave both blank to disable.
auth.basic.username =
auth.basic.password =

# Bearer token. Leave blank to disable.
auth.bearer.token =

# Multi-tenant X-Scope-OrgID header (Cortex, Mimir). Leave blank to disable.
tenant.org-id =

# --- TLS ----------------------------------------------------------------------

# PEM bundle of CA certificates to trust in addition to the JDK default
# truststore. Leave blank to use the JDK defaults only.
tls.ca-file =

# Disable hostname and certificate verification. DO NOT enable in production;
# the plugin logs a WARN on every use.
tls.insecure-skip-verify = false

# --- Write pipeline -----------------------------------------------------------

# Maximum number of samples held in memory before backpressure kicks in.
# Enqueue failures beyond this limit throw StorageException.
queue.capacity = 10000

# Maximum samples per outbound Remote Write request.
batch.size = 1000

# Flush cadence upper bound. Whichever is reached first (batch.size or this
# interval) triggers a flush.
flush.interval-ms = 1000

# 5xx retry policy. 4xx responses are dropped immediately.
retry.max-attempts        = 5
retry.initial-backoff-ms  = 250
retry.max-backoff-ms      = 10000

# --- HTTP client --------------------------------------------------------------

http.connect-timeout-ms = 5000
http.read-timeout-ms    = 30000
http.write-timeout-ms   = 30000
http.max-connections    = 16

# --- Shutdown -----------------------------------------------------------------

# Grace period for draining the queue on bundle stop. Samples still queued
# after this window are logged at WARN and dropped.
shutdown.grace-period-ms = 10000

# --- Read path ----------------------------------------------------------------

# findMetrics() lookback: how far back to search when the caller does not
# supply an explicit start. 7776000 = 90 days.
max-series-lookback-seconds = 7776000

# --- Label policy -------------------------------------------------------------
# Default allowlist: __name__, resourceId, node, node_label, foreign_source,
# foreign_id, location, resource_type, resource_instance, if_name, if_descr,
# if_speed, onms_cat_<name>.
#
# Override with comma-separated glob lists. Excludes are applied last.

# Add non-default source tags as labels. Example: ifAlias, sysDescr
labels.include =

# Remove default labels. Example: node_label  (useful if you see churn)
labels.exclude =

# Rename emitted labels. Format: fromKey->toKey, fromKey2->toKey2
labels.rename =

# Prepend a prefix to every emitted metric name (useful for multi-tenant
# backends where you want OpenNMS metrics namespaced). Blank = no prefix.
metric.prefix =

# --- OpenNMS metadata passthrough (OFF by default) ---------------------------
# WARNING: OpenNMS metadata commonly holds credentials (snmp-community,
# passwords, tokens). A built-in denylist blocks obvious credential patterns
# regardless of what you put in include, but you should still be explicit.

metadata.enabled = false

# Comma-separated glob list, format "context:key". Example:
#   metadata.include = requisition:*, node:owner
metadata.include =

# Additional denylist entries beyond the built-in patterns
# (*password*, *secret*, *token*, *key*, snmp-community).
metadata.exclude =

# Label name prefix for metadata values. Emitted as
# <prefix><context>_<sanitized-key>=<value>.
metadata.label-prefix = onms_meta_

# Case policy for metadata keys: "preserve" (keep OpenNMS casing, often
# camelCase) or "snake_case".
metadata.case = preserve
