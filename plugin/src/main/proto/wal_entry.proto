syntax = "proto3";
package org.opennms.plugins.prometheus.remotewriter.wal;

option java_package = "org.opennms.plugins.prometheus.remotewriter.wal.proto";
option java_multiple_files = true;

// One record in the Write-Ahead Log. Mirrors the fields of MappedSample
// (the plugin's post-label-mapping representation of a time series sample)
// so the WAL stores post-mapping state: labels are already the emitted
// names (e.g. "node", "job", "onms_cat_Routers"), not source-side tag
// keys. On replay, entries go straight to the wire builder without
// re-running LabelMapper.
//
// Schema evolution: never reuse field numbers; add new fields as the
// proto3 default (implicit optional). If a breaking change is ever
// required, version the wal.fmt segment header (future work) before
// changing field semantics.
message WalEntry {
  // Sample timestamp in milliseconds since Unix epoch. Prometheus's wire
  // grammar is ms-precision, so this is the native unit.
  int64 timestamp_ms = 1;

  // The metric name (the value that becomes the __name__ label on the
  // wire). Stored separately from the label map because it is the only
  // label whose presence is structurally required.
  string metric_name = 2;

  // Sample value. NaN and +/-Inf samples are filtered by the pipeline
  // before they reach the WAL; the field exists for general-case
  // future-proofing but in practice never carries non-finite values in
  // the current codebase.
  double value = 3;

  // Post-mapping labels (snake_case Prometheus names), excluding
  // __name__. Key order is unspecified on the wire but is stable across
  // round-trip (protobuf map iteration is deterministic in google-java
  // runtime output).
  map<string, string> labels = 4;
}
