name: Publish docs to GitHub Pages

# Renders docs/src/docs/asciidoc/index.adoc to a single self-contained HTML
# file and publishes it to https://opennms-forge.github.io/prometheus-remote-writer/.
# Triggered when a GitHub Release is published, so the live site always
# reflects the most recent release tag. workflow_dispatch lets a maintainer
# republish a chosen tag manually (e.g. after fixing a typo in the docs of
# an already-released version).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish docs from (defaults to the most recent release).'
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

# A new run cancels nothing — Pages prefers serializing publishes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish-docs:
    name: Render and deploy
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Resolve target tag
        id: ref
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            REF="$INPUT_TAG"
          elif [ -n "$RELEASE_TAG" ]; then
            REF="$RELEASE_TAG"
          else
            REF="${GITHUB_REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Will render docs from ref: $REF"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Maven repository
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-docs-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-docs-
            ${{ runner.os }}-m2-

      - name: Render docs
        run: make docs MAVEN_FLAGS="-B --no-transfer-progress -U"

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b  # v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: docs/target/generated-docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4
