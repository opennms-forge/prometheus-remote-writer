name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Must already exist.'
        required: true

permissions:
  contents: write
  # Needed by the final "Trigger docs publish" step, which dispatches
  # publish-docs.yml via `gh workflow run` after the release is created.
  actions: write

jobs:
  release:
    name: Build KAR and create GitHub Release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Maven repository
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Resolve tag and version
        id: resolve
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Import GPG key
        # Imports the project release-signing key from secrets. Used both
        # for verifying the pushed tag's signature and for signing the
        # release artifacts. SHA-pinned per project convention; Dependabot
        # keeps `crazy-max/ghaction-import-gpg` updates flowing.
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd  # v7.0.0
        with:
          gpg_private_key: ${{ secrets.PRW_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PRW_GPG_PASSPHRASE }}
          # No git config side effects — release-tag signing happens on
          # the maintainer's laptop per RELEASING.md pre-flight, not in
          # this workflow.
          git_user_signingkey: false
          git_commit_gpgsign: false

      - name: Verify tag signature
        # Refuse to release from an unsigned tag. The maintainer is
        # expected to run `git tag -s vX.Y.Z` per RELEASING.md pre-flight;
        # this step is the failsafe that catches an accidental plain
        # `git tag`.
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          # The Checkout step's `ref` may not have populated tag refs.
          # Fetch the tag explicitly so `git tag -v` can find it.
          git fetch origin "+refs/tags/${TAG}:refs/tags/${TAG}" --no-tags
          if ! git tag -v "${TAG}"; then
            echo "::error::Tag ${TAG} is not GPG-signed by the project key (or signature does not verify). Sign with 'git tag -s' and re-tag." >&2
            exit 1
          fi

      - name: Build KAR
        # Skip tests on the release path — CI already ran `make verify` on
        # the tagged commit before it was pushed. Shipping an untested
        # build would be a problem, but gating here is belt-and-braces.
        run: make kar MAVEN_FLAGS="-B --no-transfer-progress -U"

      - name: Generate SBOM
        # Activate the opt-in `sbom` profile to produce a CycloneDX 1.6
        # aggregate SBOM at target/bom.json. The profile is gated so that
        # local `make build` and `make kar` stay fast; only the release
        # path generates the SBOM.
        run: make sbom MAVEN_FLAGS="-B --no-transfer-progress -U"

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          if [ ! -f CHANGELOG.md ]; then
            echo "CHANGELOG.md not found; using auto-generated notes" >&2
            exit 0
          fi
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { p=1; next }
            p && /^## \[/ { exit }
            p { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG entry for $VERSION; using auto-generated notes" >&2
          else
            echo "notes-file=release-notes.md" >> "$GITHUB_OUTPUT"
          fi

      - name: Locate KAR artifact
        id: kar
        run: |
          KAR=$(find assembly/kar/target -maxdepth 1 -name '*.kar' -type f | head -1)
          if [ -z "$KAR" ]; then
            echo "::error::No KAR found in assembly/kar/target" >&2
            exit 1
          fi
          echo "path=$KAR" >> "$GITHUB_OUTPUT"

      - name: Sign release artifacts
        # Produces:
        #   ${KAR}.asc           — detached GPG signature on the KAR
        #   ${KAR}.sha512        — SHA-512 checksum of the KAR (basename only)
        #   ${KAR}.sha512.asc    — detached GPG signature on the checksum
        #   ${SBOM}              — versioned-renamed CycloneDX SBOM
        #   ${SBOM}.asc          — detached GPG signature on the SBOM
        #   KEYS                 — the project public key, ASCII-armored
        # All signing uses the project key whose fingerprint is documented
        # in RELEASING.md "Release signing key".
        env:
          KEY_ID: ${{ secrets.PRW_GPG_KEY_ID }}
        run: |
          KAR="${{ steps.kar.outputs.path }}"
          VERSION="${{ steps.resolve.outputs.version }}"
          SBOM="prometheus-remote-writer-${VERSION}.cdx.json"

          # SBOM is at target/bom.json from Generate SBOM — copy to the
          # versioned name (matches add-sbom-to-release naming).
          if [ ! -f target/bom.json ]; then
            echo "::error::target/bom.json missing; the Generate SBOM step did not produce the expected file." >&2
            exit 1
          fi
          cp target/bom.json "$SBOM"

          # Detached signature on the KAR.
          gpg --batch --yes --pinentry-mode loopback \
              --local-user "$KEY_ID" \
              --detach-sign --armor "$KAR"

          # SHA-512 checksum. cd into the KAR's directory so the checksum
          # file's filename column is the basename — keeps `sha512sum -c`
          # portable for consumers who download both into one directory.
          (cd "$(dirname "$KAR")" && sha512sum "$(basename "$KAR")" > "$(basename "$KAR").sha512")

          # Sign the checksum file.
          gpg --batch --yes --pinentry-mode loopback \
              --local-user "$KEY_ID" \
              --detach-sign --armor "${KAR}.sha512"

          # Sign the SBOM.
          gpg --batch --yes --pinentry-mode loopback \
              --local-user "$KEY_ID" \
              --detach-sign --armor "$SBOM"

          # Export the public key as the KEYS release asset.
          gpg --armor --export "$KEY_ID" > KEYS

      - name: Create GitHub Release
        # Single upload point: KAR + KAR.asc + checksum + checksum.asc +
        # SBOM + SBOM.asc + KEYS. Replaces the prior "Create + Rename
        # and upload SBOM" two-step flow now that the Sign step produces
        # all the files in one place.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          KAR="${{ steps.kar.outputs.path }}"
          VERSION="${{ steps.resolve.outputs.version }}"
          SBOM="prometheus-remote-writer-${VERSION}.cdx.json"
          ASSETS=(
            "$KAR"
            "${KAR}.asc"
            "${KAR}.sha512"
            "${KAR}.sha512.asc"
            "$SBOM"
            "${SBOM}.asc"
            "KEYS"
          )
          if [ -n "${{ steps.notes.outputs.notes-file }}" ]; then
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file "${{ steps.notes.outputs.notes-file }}" \
              "${ASSETS[@]}"
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              "${ASSETS[@]}"
          fi

      # The `release: published` event fired by `gh release create` runs
      # under GITHUB_TOKEN, so by design GitHub Actions does NOT cascade
      # it to other workflows. Manually dispatch publish-docs against
      # the just-released tag — `workflow_dispatch` is allowed even
      # when initiated by GITHUB_TOKEN.
      - name: Trigger docs publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          gh workflow run publish-docs.yml --ref main -f tag="$TAG"
